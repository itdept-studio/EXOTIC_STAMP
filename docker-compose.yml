version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: metro-stamp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: metrostamp
      POSTGRES_USER: metrostamp
      POSTGRES_PASSWORD: metrostamp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: metro-stamp-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: metrostamp_logs
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: metro-stamp-api
    depends_on:
      - postgres
      - mongo
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: metrostamp
      DB_USERNAME: metrostamp
      DB_PASSWORD: metrostamp
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DATABASE: metrostamp_logs
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  mongo_data:

