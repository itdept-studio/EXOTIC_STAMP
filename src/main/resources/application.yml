spring:
  profiles:
    active: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

application:
  frontend:
    dev: http://localhost:3000
    prod: frontend url

  backend:
    prod: backend url

  rbac:
    admin-role-code: ADMIN
    protected-system-role-codes:
      - ADMIN
    max-role-code-length: 64
    max-permission-code-length: 80
    max-description-length: 500

  mail:
    from: ${MAIL_FROM}
    logo-url: https://res.cloudinary.com/dnahocnhk/image/upload/f_png,b_white/v1762831622/fwf-logo_veozws.webp
    queue:
      max-per-minute: 30
      batch-size: 10
      poll-interval-ms: 5000
      stuck-reset-interval-ms: 600000
      stuck-processing-threshold-minutes: 5

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl: 15m
  refresh-token-ttl: 7d
  issuer: metricsX

cache:
  user-ttl: 30m
  sales-ttl: 10m
  booking-ttl: 10m
  customer-ttl: 10m
  realtime-ttl: 70s
  ttl:
    station-detail: 1800s
    metro-station-scan: 1800s
    collection-user-stamps: 600s
    collection-user-progress: 600s
    collection-user-history: 900s
    collection-stamp-book: 900s

collection:
  idempotency-window: 1h
  max-page-size: 50
  default-page-size: 20

storage:
  provider: local
  local:
    base-path: ${STORAGE_LOCAL_PATH:./uploads}
    base-url: ${STORAGE_LOCAL_URL:http://localhost:8080/uploads}
  file:
    max-size-mb: 5
    allowed-types:
      - image/jpeg
      - image/png

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO