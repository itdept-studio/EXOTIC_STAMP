spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

application:
  frontend:
    current: ${FRONTEND_URL}
  backend:
    current: ${BACKEND_URL}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.security: WARN
    org.springframework.web: INFO